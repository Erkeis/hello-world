version: '3.8'
services:
  sec-forge:
    container_name: sec-forge
    build:
      context: .
      dockerfile: agent-factory/Agent.Dockerfile
    ports:
      - "8001:8001"
    environment:
      - IDENTITY=sec-forge
      - ROLE=security
      - PORT=8001
    volumes:
      - ./shared-context:/app/shared
      - .:/app/repo
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: bash /app/repo/agent-harness/agent-entrypoint.sh

  qa-scout:
